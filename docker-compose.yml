services:
  db:
    image: pgvector/pgvector:pg16
    container_name: clip_vector_db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=clip_search
    volumes:
      - clip_pgdata:/var/lib/postgresql/data

volumes:
  clip_pgdata:
