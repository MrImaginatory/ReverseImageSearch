<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Hybrid Search | Tool-Forward AI Discovery</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="layout-wrapper">
        <!-- Sidebar: Controls & Upload -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon"><i data-lucide="camera" size="20"></i></span>
                    <span class="logo-text">Image Reverse Search</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="control-group">
                    <span class="label-caps">Search Configuration</span>
                    <div class="upload-area" id="drop-zone">
                        <input type="file" id="file-input" accept="image/*" hidden>
                        <div class="upload-content">
                            <span class="upload-icon"><i data-lucide="image-plus" size="32"></i></span>
                            <div class="upload-text">
                                <h3>Drop Image Here</h3>
                                <p>or click to browse</p>
                            </div>
                        </div>
                        <div id="preview-container" class="preview-container hidden">
                            <img id="image-preview" src="" alt="Preview">
                            <button id="clear-search" class="clear-btn" title="Clear Search">✕</button>
                        </div>
                    </div>
                </div>



                <div class="sidebar-actions" style="margin-top: 2.5rem; display: flex; flex-direction: column; gap: 1rem;">
                    <button id="search-btn" class="btn btn-primary" disabled>
                        <span><i data-lucide="search" size="18"></i></span> Start Search
                    </button>
                    
                    <div style="border-top: 1px solid var(--color-border); margin: 1rem 0;"></div>
                    
                    <span class="label-caps">Collection Management</span>
                    <button id="sync-btn" class="btn btn-secondary">
                        <span><i data-lucide="refresh-cw" size="18"></i></span> Run Index
                    </button>
                </div>
            </nav>
            
            <div class="sidebar-footer" style="margin-top: auto; padding-top: 2rem; opacity: 0.4; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">
                v1.2.0 • AI Powered
            </div>
        </aside>

        <!-- Content Area: Results -->
        <main class="content-area">
            <section id="results-placeholder" class="empty-state">
                <span class="empty-state-icon"><i data-lucide="images" size="48"></i></span>
                <h3>Waiting for Search</h3>
                <p>Upload an image to start discovery</p>
            </section>

            <section id="loader" class="loader hidden">
                <div class="spinner"></div>
                <p style="margin-top: 1.5rem; font-size: 14px; font-weight: 500; color: var(--color-gray-700);">Analyzing features and searching...</p>
            </section>

            <section id="results-section" class="hidden">
                <div id="results-grid" class="results-grid"></div>
            </section>
        </main>
    </div>

    <!-- Templates & Global UI -->
    <div id="toast" class="toast hidden"></div>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
